<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #1e1b4b, #0f766e);
      color: white;
    }
    .card {
      width: min(420px, 92vw);
      padding: 24px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }
    input, button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      box-sizing: border-box;
      margin-top: 10px;
    }
    input {
      background: rgba(255,255,255,0.12);
      color: white;
    }
    button {
      background: linear-gradient(135deg, #14b8a6, #06b6d4);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .msg { margin-top: 12px; color: #fda4af; min-height: 20px; }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Create Admin Account</h2>
    <p>This is only available before the first account exists.</p>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button id="signupBtn">Sign Up</button>
    <div class="msg" id="msg"></div>
    <p><a href="/login">Back to login</a></p>
  </div>

  <script>
    const msg = document.getElementById("msg");

    fetch("/auth/status")
      .then(r => r.json())
      .then(data => {
        if (!data.signupEnabled) window.location.href = "/login";
      });

    document.getElementById("signupBtn").addEventListener("click", async () => {
      msg.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      const res = await fetch("/auth/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (!res.ok) {
        msg.textContent = data.error || "Sign up failed";
        return;
      }

      window.location.href = "/";
    });
  </script>
</body>
</html>
